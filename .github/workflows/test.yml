name: Run Tests

on:
  push:
    branches: [dev, main]
  pull_request:
    branches: [dev, main]

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_DB: society_platform_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5433:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Generate Prisma client
        run: npx prisma generate
        working-directory: apps/api
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5433/society_platform_test

      - name: Run migrations on test DB
        run: npx prisma migrate deploy
        working-directory: apps/api
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5433/society_platform_test

      - name: Run tests
        run: npm test
        working-directory: apps/api
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5433/society_platform_test
          JWT_SECRET: test-secret-key-not-for-production
          JWT_REFRESH_SECRET: test-refresh-secret-not-for-production
          NODE_ENV: test
          PORT: 3001